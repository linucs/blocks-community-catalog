# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: builtin_led_matrix
author: Lino Moretto
version: 0.0.1
category: "Displays"
colour: "#E91E63"
description:
  en: "Uno R4 Led 12x8 LED matrix display."
  it: "Display Led matrix 12x8 per Uno R4"
docs:
  tutorial: https://docs.arduino.cc/tutorials/uno-r4-wifi/led-matrix/
implementations:
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: ArduinoGraphics
        minVersion: "1.0.0"
      - type: library
        name: Arduino_LED_Matrix
        minVersion: "1.0.0"
    # ArduinoGraphics MUST be included before Arduino_LED_Matrix — the matrix
    # library uses a compile-time #if __has_include to conditionally inherit
    # from ArduinoGraphics, so header order matters.
    codegen:
      imports:
        - '#include "ArduinoGraphics.h"'
        - '#include "Arduino_LED_Matrix.h"'
      declarations:
        - "ArduinoLEDMatrix matrix;"
      setup:
        - "matrix.begin();"
    blocks:

      # -----------------------------------------------------------------------
      # led_matrix_clear — turn off all 8x13 LEDs
      # -----------------------------------------------------------------------
      - blockly:
          type: led_matrix_clear
          message0:
            en: "LED Matrix: clear"
            it: "Matrice LED: cancella"
          args0: []
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Turn off all LEDs on the 8×13 matrix."
            it: "Spegni tutti i LED sulla matrice 8×13."
        codegen:
          body:
            - "matrix.clear();"
        tags:
          - display
          - actuator
          - beginner

      # -----------------------------------------------------------------------
      # led_matrix_scroll_text — blocking left/right/static text display
      # Requires ArduinoGraphics (already included at implementation level).
      # endText() blocks until the full scroll animation completes.
      # -----------------------------------------------------------------------
      - blockly:
          type: led_matrix_scroll_text
          message0:
            en: "LED Matrix: scroll %1 speed %2 ms"
            it: "Matrice LED: scorri %1 velocità %2 ms"
          args0:
            - type: input_value
              name: TEXT
              check: String
            - type: field_number
              name: SPEED
              value: 100
              min: 10
              max: 2000
          message1:
            en: "font %1  direction %2 %3"
            it: "font %1  direzione %2 %3"
          args1:
            - type: field_dropdown
              name: FONT
              options:
                - ["5×7", "Font_5x7"]
                - ["4×6", "Font_4x6"]
            - type: field_dropdown
              name: DIRECTION
              options:
                - ["← scroll left", "SCROLL_LEFT"]
                - ["scroll right →", "SCROLL_RIGHT"]
                - ["static", "NO_SCROLL"]
            - type: input_dummy
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Scroll (or display) text on the LED matrix. Blocking — the next block runs only after the full animation finishes."
            it: "Scorri (o visualizza) testo sulla matrice LED. Bloccante — il blocco successivo viene eseguito solo al termine dell'animazione."
        codegen:
          body:
            - "matrix.beginDraw();"
            - "matrix.stroke(0xFFFFFFFF);"
            - "matrix.textFont({{FONT}});"
            - "matrix.textScrollSpeed({{SPEED}});"
            - "matrix.beginText(0, 1, 0xFFFFFF);"
            - "matrix.println({{TEXT}});"
            - "matrix.endText({{DIRECTION}});"
            - "matrix.endDraw();"
          inputDefaults:
            TEXT: '"Hello"'
        tags:
          - display
          - actuator
          - text
          - beginner

      # -----------------------------------------------------------------------
      # led_matrix_draw — C-shaped wrapper for pixel-level drawing operations.
      # Emits beginDraw() before the body and endDraw() after; the hardware
      # framebuffer is flushed only at endDraw().
      # -----------------------------------------------------------------------
      - blockly:
          type: led_matrix_draw
          message0:
            en: "LED Matrix: draw %1"
            it: "Matrice LED: disegna %1"
          args0:
            - type: input_statement
              name: COMMANDS
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Open a drawing session on the LED matrix. Place 'set pixel' and 'fill' blocks inside. The display updates when the block ends."
            it: "Apri una sessione di disegno sulla matrice LED. Inserisci i blocchi 'pixel' e 'riempi' all'interno. Il display si aggiorna al termine del blocco."
        codegen:
          body:
            - "matrix.beginDraw();"
            - "{{COMMANDS}}"
            - "matrix.endDraw();"
        tags:
          - display
          - actuator

      # -----------------------------------------------------------------------
      # led_matrix_set_pixel — set one LED inside a draw block.
      # matrix.set(x, y, r, g, b): x = column 0-12, y = row 0-7.
      # STATE dropdown emits 1 (on) or 0 (off) for all three RGB channels.
      # -----------------------------------------------------------------------
      - blockly:
          type: led_matrix_set_pixel
          message0:
            en: "pixel  col %1  row %2  %3"
            it: "pixel  col %1  riga %2  %3"
          args0:
            - type: input_value
              name: COL
              check: ["Number", "int", "unsigned int", "long", "unsigned long",
                      "byte", "word", "uint8_t", "uint16_t", "uint32_t",
                      "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: ROW
              check: ["Number", "int", "unsigned int", "long", "unsigned long",
                      "byte", "word", "uint8_t", "uint16_t", "uint32_t",
                      "int8_t", "int16_t", "int32_t"]
            - type: field_dropdown
              name: STATE
              options:
                - ["on", "1"]
                - ["off", "0"]
          previousStatement: null
          nextStatement: null
          inputsInline: true
          tooltip:
            en: "Turn one LED on or off. Place inside 'LED Matrix: draw'. Col: 0–12 (left→right), Row: 0–7 (top→bottom)."
            it: "Accendi o spegni un singolo LED. Da inserire dentro 'Matrice LED: disegna'. Col: 0–12 (sinistra→destra), Riga: 0–7 (alto→basso)."
        codegen:
          body:
            - "matrix.set({{COL}}, {{ROW}}, {{STATE}}, {{STATE}}, {{STATE}});"
          inputDefaults:
            COL: "0"
            ROW: "0"
        tags:
          - display
          - actuator
          - beginner

      # -----------------------------------------------------------------------
      # led_matrix_fill — fill the entire display inside a draw block.
      # matrix.background(r, g, b): 255 = on, 0 = off for all 8x13 LEDs.
      # -----------------------------------------------------------------------
      - blockly:
          type: led_matrix_fill
          message0:
            en: "fill all LEDs %1"
            it: "riempi tutti i LED %1"
          args0:
            - type: field_dropdown
              name: STATE
              options:
                - ["on", "255"]
                - ["off", "0"]
          previousStatement: null
          nextStatement: null
          tooltip:
            en: "Turn all LEDs on or off at once. Place inside 'LED Matrix: draw'."
            it: "Accendi o spegni tutti i LED contemporaneamente. Da inserire dentro 'Matrice LED: disegna'."
        codegen:
          body:
            - "matrix.background({{STATE}}, {{STATE}}, {{STATE}});"
        tags:
          - display
          - actuator
          - beginner
