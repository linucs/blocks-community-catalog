# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: modulino-knob
category: "Modulino::Sensors"
colour: "#26A69A"
description:
  en: "Rotary encoder blocks for Modulino Knob (position and rotation)"
  it: "Blocchi encoder rotativo per Modulino Knob (posizione e rotazione)"
docs:
  datasheet: "https://docs.arduino.cc/hardware/modulino-knob"
  library: "https://www.arduino.cc/reference/en/libraries/modulino/"
  api: "https://github.com/arduino-libraries/Modulino/blob/main/docs/api.md"

implementations:
  # ─── C++ (MCU side) ───
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: "Arduino_Modulino"
        minVersion: "0.8.0"
    codegen:
      imports:
        - "#include <Modulino.h>"
        - "#include <Wire.h>"
      declarations:
        - "ModulinoKnob _knob;"
      setup:
        - "Wire1.begin();"
        - "Modulino.begin(Wire1);"
        - "_knob.begin();"
    blocks:
      - blockly:
          type: modulino_knob_value
          message0: "🎛 knob value"
          output: Number
          tooltip: "Read the current rotary encoder position from Modulino Knob."
          inputsInline: true
        codegen:
          body:
            - "_knob.get()"
          precedence: ATOMIC
        tags: [sensor, input, i2c, beginner]

      - blockly:
          type: modulino_knob_set
          message0: "🎛 set knob to %1"
          args0:
            - type: input_value
              name: VALUE
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          tooltip: "Set the rotary encoder value of Modulino Knob."
          inputsInline: true
        codegen:
          body:
            - "_knob.set({{VALUE}});"
          inputDefaults:
            VALUE: 0
        tags: [actuator, i2c]

      - blockly:
          type: modulino_knob_pressed
          message0: "🎛 knob button pressed"
          output: Boolean
          tooltip: "True if the push-button on the Modulino Knob is currently held down."
          inputsInline: true
        codegen:
          body:
            - "_knob.isPressed()"
          precedence: ATOMIC
        tags: [sensor, input, i2c, beginner]
