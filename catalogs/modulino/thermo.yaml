# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: modulino_thermo
category: "Modulino::Sensors"
colour: "#26A69A"
description:
  en: "Temperature and humidity sensor blocks for Modulino Thermo"
  it: "Blocchi sensore di temperatura e umidità per Modulino Thermo"
docs:
  datasheet: "https://docs.arduino.cc/hardware/modulino-thermo"
  library: "https://www.arduino.cc/reference/en/libraries/modulino/"
  api: "https://github.com/arduino-libraries/Modulino/blob/main/docs/api.md"

implementations:
  # ─── C++ (MCU side) ───
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: "Arduino_Modulino"
        minVersion: "0.8.0"
    codegen:
      imports:
        - "#include <Modulino.h>"
        - "#include <Wire.h>"
      declarations:
        - "ModulinoThermo _thermo;"
      setup:
        - "Wire1.begin();"
        - "Modulino.begin(Wire1);"
        - "_thermo.begin();"
    blocks:
      - blockly:
          type: modulino_thermo_temperature
          message0: "🌡 temperature (°C)"
          output: Number
          tooltip: "Read the temperature in Celsius from Modulino Thermo."
        codegen:
          body:
            - "_thermo.getTemperature()"
          precedence: ATOMIC

      - blockly:
          type: modulino_thermo_humidity
          message0: "💧 humidity (%)"
          output: Number
          tooltip: "Read the relative humidity from Modulino Thermo."
        codegen:
          body:
            - "_thermo.getHumidity()"
          precedence: ATOMIC
