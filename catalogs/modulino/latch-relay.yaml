id: modulino-latch-relay
category: "Sensors"
docs:
  datasheet: "https://docs.arduino.cc/hardware/modulino-latch-relay"
  library: "https://www.arduino.cc/reference/en/libraries/modulino/"
  api: "https://github.com/arduino-libraries/Modulino/blob/main/docs/api.md"

implementations:
  # ─── C++ (MCU side) ───
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: "Arduino_Modulino"
        minVersion: "0.8.0"
    codegen:
      imports:
        - "#include <Modulino.h>"
        - "#include <Wire.h>"
      declarations:
        - "ModulinoLatchRelay _relay;"
      setup:
        - "Wire1.begin();"
        - "Modulino.begin(Wire1);"
        - "_relay.begin();"
    blocks:
      - blockly:
          type: modulino_relay_on
          message0: "🔌 relay on"
          previousStatement: null
          nextStatement: null
          tooltip: "Latch the Modulino Relay to the ON (closed) position."
          inputsInline: true
        codegen:
          body:
            - "_relay.set();"
        tags: [actuator, relay, i2c, beginner]

      - blockly:
          type: modulino_relay_off
          message0: "🔌 relay off"
          previousStatement: null
          nextStatement: null
          tooltip: "Latch the Modulino Relay to the OFF (open) position."
          inputsInline: true
        codegen:
          body:
            - "_relay.reset();"
        tags: [actuator, relay, i2c, beginner]

      - blockly:
          type: modulino_relay_status
          message0: "🔌 relay status"
          output: Number
          tooltip: "Read the current relay status from Modulino LatchRelay."
          inputsInline: true
        codegen:
          body:
            - "_relay.getStatus()"
          precedence: ATOMIC
        tags: [sensor, relay, i2c]

  # ─── Python (SBC side) ───
  - runtime: "arduino:python"
    dependencies:
      - type: pip
        name: "modulino"
        minVersion: "0.5.0"
    codegen:
      imports:
        - "from modulino import ModulinoLatchRelay"
      declarations:
        - "_relay = ModulinoLatchRelay()"
    blocks:
      - blockly:
          type: modulino_relay_on
          message0: "🔌 relay on"
          previousStatement: null
          nextStatement: null
          tooltip: "Turn on the Modulino Relay."
          inputsInline: true
        codegen:
          body:
            - "_relay.on()"
        tags: [actuator, relay, i2c, beginner]

      - blockly:
          type: modulino_relay_off
          message0: "🔌 relay off"
          previousStatement: null
          nextStatement: null
          tooltip: "Turn off the Modulino Relay."
          inputsInline: true
        codegen:
          body:
            - "_relay.off()"
        tags: [actuator, relay, i2c, beginner]

      - blockly:
          type: modulino_relay_status
          message0: "🔌 relay on?"
          output: Boolean
          tooltip: "True if the Modulino Relay is currently on."
          inputsInline: true
        codegen:
          body:
            - "_relay.is_on"
          precedence: ATOMIC
        tags: [sensor, relay, i2c]
