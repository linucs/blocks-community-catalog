id: modulino-vibro
category: "Sensors"
docs:
  datasheet: "https://docs.arduino.cc/hardware/modulino-vibro"
  library: "https://www.arduino.cc/reference/en/libraries/modulino/"
  api: "https://github.com/arduino-libraries/Modulino/blob/main/docs/api.md"

implementations:
  # ─── C++ (MCU side) ───
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: "Arduino_Modulino"
        minVersion: "0.8.0"
    codegen:
      imports:
        - "#include <Modulino.h>"
        - "#include <Wire.h>"
      declarations:
        - "ModulinoVibro _vibro;"
      setup:
        - "Wire1.begin();"
        - "Modulino.begin(Wire1);"
        - "_vibro.begin();"
    blocks:
      - blockly:
          type: modulino_vibro_on
          message0: "📳 vibrate for %1 ms"
          args0:
            - type: input_value
              name: DURATION
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          tooltip: "Activate the Modulino Vibro motor for the specified duration in milliseconds."
          inputsInline: true
        codegen:
          body:
            - "_vibro.on({{DURATION}});"
          inputDefaults:
            DURATION: 500
        tags: [actuator, haptic, i2c, beginner]

      - blockly:
          type: modulino_vibro_off
          message0: "📳 stop vibration"
          previousStatement: null
          nextStatement: null
          tooltip: "Stop the Modulino Vibro motor immediately."
          inputsInline: true
        codegen:
          body:
            - "_vibro.off();"
        tags: [actuator, haptic, i2c]

  # ─── Python (SBC side) ───
  - runtime: "arduino:python"
    dependencies:
      - type: pip
        name: "modulino"
        minVersion: "0.5.0"
    codegen:
      imports:
        - "from modulino import ModulinoVibro"
      declarations:
        - "_vibro = ModulinoVibro()"
    blocks:
      - blockly:
          type: modulino_vibro_on
          message0: "📳 vibrate for %1 ms"
          args0:
            - type: input_value
              name: DURATION
          previousStatement: null
          nextStatement: null
          tooltip: "Activate the Modulino Vibro motor for the specified duration in milliseconds."
          inputsInline: true
        codegen:
          body:
            - "_vibro.on({{DURATION}})"
          inputDefaults:
            DURATION: 500
        tags: [actuator, haptic, i2c, beginner]

      - blockly:
          type: modulino_vibro_off
          message0: "📳 stop vibration"
          previousStatement: null
          nextStatement: null
          tooltip: "Stop the Modulino Vibro motor immediately."
          inputsInline: true
        codegen:
          body:
            - "_vibro.off()"
        tags: [actuator, haptic, i2c]
