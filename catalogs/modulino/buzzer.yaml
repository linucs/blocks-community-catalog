# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: modulino-buzzer
author: Lino Moretto
version: 0.0.1
category: "Modulino::Actuators"
colour: "#26A69A"
description:
  en: "Buzzer and tone generation blocks for Modulino Buzzer"
  it: "Blocchi buzzer e generazione toni per Modulino Buzzer"
docs:
  datasheet: "https://docs.arduino.cc/hardware/modulino-buzzer"
  library: "https://www.arduino.cc/reference/en/libraries/modulino/"
  api: "https://github.com/arduino-libraries/Modulino/blob/main/docs/api.md"

implementations:
  # ─── C++ (MCU side) ───
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: "Arduino_Modulino"
        minVersion: "0.8.0"
    codegen:
      imports:
        - "#include <Modulino.h>"
        - "#include <Wire.h>"
      declarations:
        - "ModulinoBuzzer _buzzer;"
      setup:
        - "Wire.begin();"
        - "Modulino.begin(Wire);"
        - "_buzzer.begin();"
    blocks:
      - blockly:
          type: modulino_buzzer_tone
          message0: "🔔 buzzer tone %1 Hz for %2 ms"
          args0:
            - type: input_value
              name: FREQ
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: DURATION
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          tooltip: "Play a tone at the specified frequency (Hz) for a duration (ms) on Modulino Buzzer."
          inputsInline: true
        codegen:
          body:
            - "_buzzer.tone({{FREQ}}, {{DURATION}});"
          inputDefaults:
            FREQ: 440
            DURATION: 200
        tags: [actuator, audio, i2c, beginner]

      - blockly:
          type: modulino_buzzer_stop
          message0: "🔔 buzzer stop"
          previousStatement: null
          nextStatement: null
          tooltip: "Stop any playing tone on Modulino Buzzer."
          inputsInline: true
        codegen:
          body:
            - "_buzzer.noTone();"
        tags: [actuator, audio, i2c]

