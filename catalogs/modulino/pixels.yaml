# yaml-language-server: $schema=https://raw.githubusercontent.com/linucs/vscode-blockly/refs/heads/main/src/catalog/block-catalog_v1.schema.json
id: modulino-pixels
author: Lino Moretto
version: 0.0.1
category: "Modulino::Actuators"
colour: "#26A69A"
description:
  en: "RGB LED strip blocks for Modulino Pixels (8 addressable LEDs)"
  it: "Blocchi striscia LED RGB per Modulino Pixels (8 LED indirizzabili)"
docs:
  datasheet: "https://docs.arduino.cc/hardware/modulino-pixels"
  library: "https://www.arduino.cc/reference/en/libraries/modulino/"
  api: "https://github.com/arduino-libraries/Modulino/blob/main/docs/api.md"

implementations:
  # ─── C++ (MCU side) ───
  - runtime: "arduino:cpp"
    dependencies:
      - type: library
        name: "Arduino_Modulino"
        minVersion: "0.8.0"
    codegen:
      imports:
        - "#include <Modulino.h>"
        - "#include <Wire.h>"
      declarations:
        - "ModulinoPixels _pixels;"
      setup:
        - "Wire.begin();"
        - "Modulino.begin(Wire);"
        - "_pixels.begin();"
    blocks:
      - blockly:
          type: modulino_pixels_set
          message0: "💡 pixel %1 R %2 G %3 B %4 brightness %5"
          args0:
            - type: input_value
              name: IDX
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: R
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: G
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: B
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
            - type: input_value
              name: BRIGHT
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          tooltip: "Set the colour and brightness (0-100) of one LED on Modulino Pixels (0-7)."
          inputsInline: true
        codegen:
          body:
            - "_pixels.set({{IDX}}, {{R}}, {{G}}, {{B}}, {{BRIGHT}});"
          inputDefaults:
            IDX: 0
            R: 255
            G: 0
            B: 0
            BRIGHT: 25
        tags: [actuator, led, i2c, beginner]

      - blockly:
          type: modulino_pixels_clear
          message0: "💡 clear pixel %1"
          args0:
            - type: input_value
              name: IDX
              check: ["Number", "int", "unsigned int", "long", "unsigned long", "byte",
                      "word", "uint8_t", "uint16_t", "uint32_t", "int8_t", "int16_t", "int32_t"]
          previousStatement: null
          nextStatement: null
          tooltip: "Turn off one LED on Modulino Pixels."
          inputsInline: true
        codegen:
          body:
            - "_pixels.clear({{IDX}});"
          inputDefaults:
            IDX: 0
        tags: [actuator, led, i2c]

      - blockly:
          type: modulino_pixels_clear_all
          message0: "💡 clear all pixels"
          previousStatement: null
          nextStatement: null
          tooltip: "Turn off all 8 LEDs on Modulino Pixels."
          inputsInline: true
        codegen:
          body:
            - "_pixels.clear();"
        tags: [actuator, led, i2c, beginner]

      - blockly:
          type: modulino_pixels_show
          message0: "💡 show pixels"
          previousStatement: null
          nextStatement: null
          tooltip: "Apply buffered colour changes to the Modulino Pixels LEDs."
          inputsInline: true
        codegen:
          body:
            - "_pixels.show();"
        tags: [actuator, led, i2c, beginner]
